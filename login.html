<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Legacy Core — تسجيل الدخول</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2318">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Alexandria:wght@400;600;700;800&family=Manrope:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Alexandria',sans-serif}
body{background:#0f2318;display:flex;align-items:stretch;justify-content:stretch}

/* ── WRAP ── */
.lc-wrap{display:flex;width:100%;height:100%;height:100vh;min-height:100vh}

/* ── BRAND PANEL (desktop only) ── */
.lc-brand{
  width:42%;background:rgba(255,255,255,.04);
  border-left:1px solid rgba(212,160,23,.1);
  display:flex;flex-direction:column;justify-content:space-between;
  padding:56px 48px;position:relative;overflow:hidden;
}
.lc-brand::before{content:'';position:absolute;top:-120px;right:-120px;width:350px;height:350px;border-radius:50%;background:rgba(212,160,23,.03)}
.lc-brand::after{content:'';position:absolute;bottom:-120px;left:-120px;width:350px;height:350px;border-radius:50%;background:rgba(212,160,23,.03)}
.lc-brand-top{position:relative;z-index:1}
.lc-brand-logo{width:96px;height:96px;border-radius:22px;overflow:hidden;margin-bottom:24px;box-shadow:0 8px 32px rgba(0,0,0,.4);border:1.5px solid rgba(212,160,23,.2)}
.lc-brand-logo img{width:100%;height:100%;object-fit:cover}
.lc-brand-name{font-family:'Manrope',sans-serif;font-size:22px;font-weight:800;color:#D4A017;letter-spacing:3px;margin-bottom:4px}
.lc-brand-sub{font-family:'Manrope',sans-serif;font-size:11px;color:rgba(212,160,23,.45);letter-spacing:3px}
.lc-brand-feats{position:relative;z-index:1;display:flex;flex-direction:column;gap:18px;border-top:1px solid rgba(255,255,255,.06);padding-top:24px}
.lc-feat{display:flex;align-items:flex-start;gap:12px}
.lc-feat-ico{width:36px;height:36px;border-radius:10px;background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.15);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.lc-feat-t{font-size:12px;font-weight:700;color:#D4A017;margin-bottom:2px}
.lc-feat-d{font-size:11px;color:rgba(255,255,255,.3);line-height:1.4}

/* ── FORM PANEL ── */
.lc-form{
  flex:1;display:flex;flex-direction:column;
  justify-content:center;padding:48px 56px;
  overflow:hidden;
}
.lc-mob-brand{display:none}
.lc-welcome{font-size:26px;font-weight:800;color:#fff;margin-bottom:4px}
.lc-hint{font-size:14px;color:rgba(255,255,255,.4);margin-bottom:28px}
.lc-field{margin-bottom:14px;position:relative}
.lc-ico{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;color:rgba(255,255,255,.3);pointer-events:none}
.lc-inp{
  width:100%;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.1);border-radius:12px;
  padding:13px 44px 13px 14px;font-size:15px;color:#fff;
  font-family:inherit;outline:none;transition:border-color .2s,background .2s;
}
.lc-inp::placeholder{color:rgba(255,255,255,.3)}
.lc-inp:focus{border-color:rgba(212,160,23,.5);background:rgba(255,255,255,.1)}
.lc-inp-pass{padding-left:42px}
.lc-eye{position:absolute;left:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.3);font-size:15px;padding:2px}
.lc-eye:hover{color:#D4A017}
.lc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;margin-top:4px}
.lc-remember{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.4);cursor:pointer}
.lc-remember input{accent-color:#D4A017;width:14px;height:14px}
.lc-forgot{background:none;border:none;color:#D4A017;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.lc-btn{
  width:100%;background:linear-gradient(135deg,#D4A017,#c49010);
  color:#1D3C2A;border:none;border-radius:12px;padding:14px;
  font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;
  box-shadow:0 4px 20px rgba(212,160,23,.3);transition:opacity .2s;
}
.lc-btn:hover{opacity:.9}
.lc-btn:disabled{opacity:.6;cursor:not-allowed}
.lc-status-msg{font-size:13px;text-align:center;margin-top:12px;min-height:20px;color:#e74c3c}
.lc-status-msg.ok{color:#27AE60}
.lc-status-msg.ng{color:#D4A017}
.lc-stat{display:flex;align-items:center;gap:8px;margin-top:20px;justify-content:center}
.lc-stat-dot{width:7px;height:7px;border-radius:50%;background:#27AE60;flex-shrink:0}
.lc-stat span{font-size:12px;color:rgba(255,255,255,.3)}

/* ── FORGOT OVERLAY ── */
.lc-forgot-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  z-index:9999;align-items:center;justify-content:center;padding:20px;
}
.lc-forgot-overlay.show{display:flex}
.lc-forgot-card{
  background:#1D3C2A;border:1px solid rgba(212,160,23,.2);
  border-radius:20px;padding:28px 24px;width:100%;max-width:380px;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
}
.lc-forgot-title{font-size:16px;font-weight:800;color:#D4A017;margin-bottom:16px}
.lc-forgot-inp{
  width:100%;padding:12px 14px;border-radius:12px;
  border:1.5px solid rgba(212,160,23,.25);
  background:rgba(0,0,0,.25);color:#D4C49A;
  font-family:inherit;font-size:14px;outline:none;margin-bottom:16px;
}
.lc-forgot-btns{display:flex;gap:10px}
.lc-forgot-cancel{flex:1;padding:12px;background:rgba(212,196,154,.08);border:1px solid rgba(212,196,154,.15);border-radius:12px;color:rgba(212,196,154,.7);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.lc-forgot-send{flex:1;padding:12px;background:linear-gradient(135deg,#D4A017,#c49010);border:none;border-radius:12px;color:#1D3C2A;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer}
.lc-forgot-msg{font-size:12px;text-align:center;margin-top:10px;min-height:18px;color:#27AE60}

/* ── MOBILE ── */
@media(max-width:600px){
  .lc-brand{display:none}
  .lc-form{
    flex:1;padding:0;
    background:#0f2318;
    justify-content:flex-start;
    position:relative;
  }
  .lc-mob-brand{
    display:flex;align-items:center;gap:14px;
    padding:48px 24px 22px;flex-shrink:0;
    position:relative;z-index:1;
  }
  .lc-mob-logo{width:56px;height:56px;border-radius:14px;overflow:hidden;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,.4);border:1px solid rgba(212,160,23,.2)}
  .lc-mob-logo img{width:100%;height:100%;object-fit:cover}
  .lc-mob-name{font-family:'Manrope',sans-serif;font-size:18px;font-weight:800;color:#D4A017;letter-spacing:2px}
  .lc-mob-sub{font-family:'Manrope',sans-serif;font-size:10px;color:rgba(212,160,23,.45);letter-spacing:2px;margin-top:2px}
  .lc-card{
    flex:1;background:#fff;border-radius:28px 28px 0 0;
    padding:26px 24px 20px;
    display:flex;flex-direction:column;
    overflow:hidden;min-height:0;
    position:relative;z-index:1;
  }
  .lc-welcome{color:#1D3C2A;font-size:21px}
  .lc-hint{color:#999;font-size:13px;margin-bottom:20px}
  .lc-ico{color:#bbb}
  .lc-inp{background:#f8f8f8;border-color:#ebebeb;color:#222;font-size:14px;padding:12px 40px 12px 14px}
  .lc-inp::placeholder{color:#bbb}
  .lc-inp:focus{border-color:#1D3C2A;background:#fff}
  .lc-inp-pass{padding-left:40px}
  .lc-eye{color:#bbb}
  .lc-remember{color:#888}
  .lc-stat span{color:#ccc}
}
</style>
</head>

<script>
const SB='https://ctcoqgluaytwelnutrox.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0Y29xZ2x1YXl0d2VsbnV0cm94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTU5MTIsImV4cCI6MjA5NDE5MTkxMn0.Bh3LH_tkSe9H1olWr3R9-ETa_cNnD9EjZwU8yTKbn_o';

// تحقق لو موجود session — روح للتطبيق مباشرة
(async function(){
  const tk=localStorage.getItem('lg_tk');
  const id=localStorage.getItem('lg_uid');
  if(tk&&id){
    try{
      const r=await fetch(SB+'/auth/v1/user',{headers:{'apikey':AK,'Authorization':'Bearer '+tk}});
      if(r.ok){window.location.replace('index.html');return;}
    }catch(e){}
    localStorage.removeItem('lg_tk');localStorage.removeItem('lg_uid');localStorage.removeItem('lg_em');
  }
})();

function setMsg(txt,type='err'){
  const el=document.getElementById('loginMsg');
  el.textContent=txt;
  el.className='lc-status-msg '+(type==='ok'?'ok':type==='ng'?'ng':'');
}

async function doLogin(){
  const email=document.getElementById('lemail').value.trim();
  const pass=document.getElementById('lpass').value;
  if(!email||!pass){setMsg('ادخل الإيميل والباسورد');return;}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;
  setMsg('⏳ جاري الدخول...','ng');
  try{
    const r=await fetch(SB+'/auth/v1/token?grant_type=password',{
      method:'POST',
      headers:{'apikey':AK,'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass})
    });
    const d=await r.json();
    if(!r.ok)throw new Error(d.error_description||d.message||'خطأ في الدخول');
    localStorage.setItem('lg_tk',d.access_token);
    localStorage.setItem('lg_uid',d.user.id);
    localStorage.setItem('lg_em',email);
    if(d.refresh_token)localStorage.setItem('lg_rt',d.refresh_token);
    setMsg('✅ تم الدخول بنجاح','ok');
    setTimeout(()=>window.location.replace('index.html'),300);
  }catch(e){
    setMsg('❌ '+e.message);
    btn.disabled=false;
  }
}

function togglePass(){
  const inp=document.getElementById('lpass');
  const ico=document.getElementById('eyeIco');
  if(inp.type==='password'){inp.type='text';ico.className='ti ti-eye-off';}
  else{inp.type='password';ico.className='ti ti-eye';}
}

function openForgot(){
  document.getElementById('forgotOverlay').classList.add('show');
  document.getElementById('forgotEmail').value=document.getElementById('lemail').value;
  document.getElementById('forgotMsg').textContent='';
}

function closeForgot(){
  document.getElementById('forgotOverlay').classList.remove('show');
}

async function sendReset(){
  const email=document.getElementById('forgotEmail').value.trim();
  const msg=document.getElementById('forgotMsg');
  if(!email){msg.textContent='ادخل البريد الإلكتروني';msg.style.color='#e74c3c';return;}
  msg.textContent='⏳ جاري الإرسال...';msg.style.color='#D4A017';
  try{
    const r=await fetch(SB+'/auth/v1/recover',{
      method:'POST',
      headers:{'apikey':AK,'Content-Type':'application/json'},
      body:JSON.stringify({email})
    });
    if(r.ok){
      msg.textContent='✅ تم إرسال رابط الاستعادة على بريدك';
      msg.style.color='#27AE60';
    }else{
      const d=await r.json();
      msg.textContent='❌ '+(d.message||'حاول تاني');
      msg.style.color='#e74c3c';
    }
  }catch(e){
    msg.textContent='❌ تأكد من الاتصال بالإنترنت';
    msg.style.color='#e74c3c';
  }
}
</script>
