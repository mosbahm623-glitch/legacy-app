<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير المشروع — Legacy Core</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Cairo',sans-serif;background:#f5f5f0;color:#1a2e1a;direction:rtl;min-height:100vh}
  .header{background:linear-gradient(135deg,#1D3C2A,#2D5A3E);color:#D4C49A;padding:24px 20px;text-align:center}
  .header-logo{font-size:13px;opacity:.6;margin-bottom:4px;letter-spacing:2px}
  .header-title{font-size:22px;font-weight:800;margin-bottom:2px}
  .header-sub{font-size:12px;opacity:.6}
  .container{max-width:720px;margin:0 auto;padding:20px 16px}
  .card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid #ede8df}
  .card-title{font-size:13px;font-weight:700;color:#5a7a5a;margin-bottom:14px;display:flex;align-items:center;gap:6px}

  /* فلتر الفترة */
  .filter-card{background:linear-gradient(135deg,#f8f6f0,#fff);border-radius:16px;padding:18px 20px;margin-bottom:16px;border:1px solid #ede8df}
  .filter-title{font-size:13px;font-weight:700;color:#5a7a5a;margin-bottom:12px}
  .filter-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .filter-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:130px}
  .filter-label{font-size:11px;color:#888;font-weight:600}
  .filter-input{padding:9px 12px;border:1px solid #ddd;border-radius:10px;font-family:'Cairo',sans-serif;font-size:13px;background:#fff;color:#1a2e1a;outline:none}
  .filter-input:focus{border-color:#2D5A3E}
  .filter-btn{padding:9px 20px;background:linear-gradient(135deg,#1D3C2A,#2D5A3E);color:#D4C49A;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
  .filter-btn:hover{opacity:.9}
  .filter-reset{padding:9px 14px;background:#f0ede6;color:#5a7a5a;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer}

  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .kpi-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
  .kpi{border-radius:14px;padding:16px;text-align:center;border:1px solid #ede8df}
  .kpi.inc{background:#f0faf5;border-color:#b8e8d4}
  .kpi.exp{background:#fff5f5;border-color:#f5c6c6}
  .kpi.bal{background:#f8f6f0;border-color:#e0d8c8}
  .kpi.neu{background:#f8f6f0;border-color:#ede8df}
  .kpi-lbl{font-size:11px;color:#888;margin-bottom:6px;font-weight:600}
  .kpi-val{font-size:17px;font-weight:800}
  .kpi-val.inc{color:#1D9E75}
  .kpi-val.exp{color:#e74c3c}
  .kpi-val.bal-pos{color:#1D9E75}
  .kpi-val.bal-neg{color:#e74c3c}
  .kpi-val.neu{color:#5a7a5a}

  /* Progress bar */
  .progress-wrap{margin-top:10px;background:#f0ede6;border-radius:20px;height:8px;overflow:hidden}
  .progress-bar{height:100%;border-radius:20px;transition:width .5s}
  .progress-bar.good{background:linear-gradient(90deg,#1D9E75,#27ae60)}
  .progress-bar.warn{background:linear-gradient(90deg,#f39c12,#e67e22)}
  .progress-bar.danger{background:linear-gradient(90deg,#e74c3c,#c0392b)}
  .progress-label{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-top:4px}

  /* جدول */
  table{width:100%;border-collapse:collapse;font-size:12px}
  thead th{background:#f0ede6;padding:9px 10px;text-align:right;font-weight:700;color:#5a7a5a;font-size:11px}
  tbody td{padding:9px 10px;border-bottom:1px solid #f5f2ec;color:#333;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#fafaf8}
  tfoot td{padding:10px;font-weight:700;background:#f0ede6}
  .amt-inc{font-weight:700;color:#1D9E75;white-space:nowrap}
  .amt-exp{font-weight:700;color:#e74c3c;white-space:nowrap}
  .seq-badge{background:#e8f4ee;color:#1D9E75;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
  .seq-badge.exp{background:#fef0f0;color:#e74c3c}
  .cat-badge{background:#f0ede6;color:#5a7a5a;padding:2px 7px;border-radius:5px;font-size:10px}

  /* tabs */
  .tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .tab{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid #ddd;background:#f8f6f0;color:#888;font-family:'Cairo',sans-serif}
  .tab.on{background:linear-gradient(135deg,#1D3C2A,#2D5A3E);color:#D4C49A;border-color:transparent}

  /* info rows */
  .info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0ede6;font-size:13px}
  .info-row:last-child{border-bottom:none}
  .info-lbl{color:#888}
  .info-val{font-weight:700;color:#1a2e1a}

  /* action buttons */
  .action-row{display:flex;gap:10px;margin-bottom:16px}
  .pdf-btn{flex:1;padding:13px;background:linear-gradient(135deg,#1D3C2A,#2D5A3E);color:#D4C49A;border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-align:center}
  .pdf-btn:hover{opacity:.9}
  .wa-btn{flex:1;padding:13px;background:#25D366;color:#fff;border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center}
  .wa-btn:hover{opacity:.9}

  .loading{text-align:center;padding:60px 20px;color:#888;font-size:15px}
  .error{text-align:center;padding:40px 20px;color:#e74c3c;font-size:14px}
  .empty{text-align:center;padding:30px;color:#aaa;font-size:13px}
  .footer{text-align:center;padding:20px;font-size:11px;color:#aaa}
  .period-badge{display:inline-block;background:#e8f4ee;color:#1D3C2A;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:4px}

  @media(max-width:480px){
    .kpi-grid-3{grid-template-columns:1fr 1fr}
    .filter-row{flex-direction:column}
    .filter-group{min-width:unset}
    .action-row{flex-direction:column}
  }
  @media print{
    .pdf-btn,.wa-btn,.filter-card,.tabs,.action-row{display:none!important}
    .card{box-shadow:none;border:1px solid #ddd}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">LEGACY CORE</div>
  <div class="header-title" id="projName">⏳ جاري التحميل...</div>
  <div class="header-sub" id="reportDate"></div>
  <div id="periodBadge"></div>
</div>

<div class="container">
  <div id="content"><div class="loading">⏳ جاري تحميل بيانات المشروع...</div></div>
</div>

<div class="footer">تقرير صادر من Legacy Core · للاستفسار تواصل مع مكتب المشروع</div>

<script>
const SB = 'https://ctcoqgluaytwelnutrox.supabase.co';
const AK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0Y29xZ2x1YXl0d2VsbnV0cm94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTU5MTIsImV4cCI6MjA5NDE5MTkxMn0.Bh3LH_tkSe9H1olWr3R9-ETa_cNnD9EjZwU8yTKbn_o';

let _allInc=[], _allExp=[], _proj=null;
let _curTab='summary';

function fn(n){return Number(n||0).toLocaleString('en-US');}

function cleanDate(s){
  if(!s)return'—';
  const str=String(s).trim();
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(str))return str;
  if(/^\d{4}-\d{2}-\d{2}$/.test(str)){const p=str.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
  try{
    const d=new Date(str);
    if(!isNaN(d.getTime())){
      const dd=String(d.getDate()).padStart(2,'0');
      const mm=String(d.getMonth()+1).padStart(2,'0');
      return dd+'/'+mm+'/'+d.getFullYear();
    }
  }catch(_){}
  return str;
}

function parseDate(s){
  if(!s)return null;
  if(/^\d{4}-\d{2}-\d{2}$/.test(s.trim()))return new Date(s.trim());
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s.trim())){
    const [d,m,y]=s.trim().split('/');
    return new Date(`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`);
  }
  return null;
}

function toInputDate(s){
  if(!s)return'';
  const d=parseDate(s);
  if(!d)return'';
  return d.toISOString().split('T')[0];
}

async function sbGet(path){
  const r=await fetch(SB+'/rest/v1/'+path,{headers:{'apikey':AK,'Authorization':'Bearer '+AK}});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

function filterByPeriod(entries, from, to){
  return entries.filter(e=>{
    const d=parseDate(e.entry_date);
    if(!d)return true;
    if(from && d < from)return false;
    if(to && d > to)return false;
    return true;
  });
}

function renderSummary(inc, exp){
  const totalInc=inc.reduce((s,e)=>s+e.amount,0);
  const totalExp=exp.reduce((s,e)=>s+e.amount,0);
  const bal=totalInc-totalExp;
  const pct=totalInc>0?Math.min(100,Math.round((totalExp/totalInc)*100)):0;
  const barClass=pct>90?'danger':pct>70?'warn':'good';

  return `
    <div class="kpi-grid">
      <div class="kpi inc">
        <div class="kpi-lbl">📈 إجمالي الوارد</div>
        <div class="kpi-val inc">${fn(totalInc)} ج</div>
      </div>
      <div class="kpi exp">
        <div class="kpi-lbl">📉 إجمالي المصاريف</div>
        <div class="kpi-val exp">${fn(totalExp)} ج</div>
      </div>
    </div>
    <div class="kpi bal" style="margin-bottom:14px">
      <div class="kpi-lbl">💰 صافي الرصيد</div>
      <div class="kpi-val ${bal>=0?'bal-pos':'bal-neg'}">${bal>=0?'▲':'▼'} ${fn(Math.abs(bal))} ج</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar ${barClass}" style="width:${pct}%"></div>
    </div>
    <div class="progress-label">
      <span>نسبة الصرف</span>
      <span>${pct}%</span>
    </div>
    <div style="height:14px"></div>
    <div class="kpi-grid-3">
      <div class="kpi neu"><div class="kpi-lbl">دفعات واردة</div><div class="kpi-val neu">${inc.length}</div></div>
      <div class="kpi neu"><div class="kpi-lbl">بنود مصاريف</div><div class="kpi-val neu">${exp.length}</div></div>
      <div class="kpi neu"><div class="kpi-lbl">% الصرف</div><div class="kpi-val neu">${pct}%</div></div>
    </div>
    ${_proj.start_date?`<div class="info-row"><span class="info-lbl">تاريخ البداية</span><span class="info-val">${cleanDate(_proj.start_date)}</span></div>`:''}
    ${_proj.close_date?`<div class="info-row"><span class="info-lbl">تاريخ الإغلاق</span><span class="info-val">${cleanDate(_proj.close_date)}</span></div>`:''}
  `;
}

function renderInc(inc){
  if(!inc.length)return'<div class="empty">لا توجد دفعات في هذه الفترة</div>';
  const total=inc.reduce((s,e)=>s+e.amount,0);
  const rows=inc.map((e,i)=>`<tr>
    <td style="color:#aaa;font-size:11px">${i+1}</td>
    <td>${e.seq?`<span class="seq-badge">${e.seq}</span>`:'—'}</td>
    <td>${cleanDate(e.entry_date)}</td>
    <td>${e.description||e.category||'—'}</td>
    <td class="amt-inc">▲ ${fn(e.amount)} ج</td>
  </tr>`).join('');
  return`<table>
    <thead><tr><th>#</th><th>رقم</th><th>التاريخ</th><th>البيان</th><th>المبلغ</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td colspan="4" style="color:#5a7a5a">الإجمالي</td><td class="amt-inc">▲ ${fn(total)} ج</td></tr></tfoot>
  </table>`;
}

function renderExp(exp){
  if(!exp.length)return'<div class="empty">لا توجد مصاريف في هذه الفترة</div>';
  const total=exp.reduce((s,e)=>s+e.amount,0);
  const rows=exp.map((e,i)=>`<tr>
    <td style="color:#aaa;font-size:11px">${i+1}</td>
    <td>${e.seq?`<span class="seq-badge exp">${e.seq}</span>`:'—'}</td>
    <td>${cleanDate(e.entry_date)}</td>
    <td>${e.description||'—'}</td>
    <td>${e.category?`<span class="cat-badge">${e.category}</span>`:'—'}</td>
    <td class="amt-exp">▼ ${fn(e.amount)} ج</td>
  </tr>`).join('');
  return`<table>
    <thead><tr><th>#</th><th>رقم</th><th>التاريخ</th><th>البيان</th><th>البند</th><th>المبلغ</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td colspan="5" style="color:#5a7a5a">الإجمالي</td><td class="amt-exp">▼ ${fn(total)} ج</td></tr></tfoot>
  </table>`;
}

function renderTab(tab, inc, exp){
  _curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.tab===tab));
  const body=document.getElementById('tabBody');
  if(tab==='summary') body.innerHTML=renderSummary(inc,exp);
  else if(tab==='inc') body.innerHTML=renderInc(inc);
  else if(tab==='exp') body.innerHTML=renderExp(exp);
}

function applyFilter(){
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  const fromDate=from?new Date(from):null;
  const toDate=to?new Date(to+'T23:59:59'):null;

  const inc=filterByPeriod(_allInc, fromDate, toDate);
  const exp=filterByPeriod(_allExp, fromDate, toDate);

  // تحديث الـ period badge
  const badge=document.getElementById('periodBadge');
  if(from||to){
    badge.innerHTML=`<span class="period-badge">📅 ${from?cleanDate(from):'البداية'} ← ${to?cleanDate(to):'الآن'}</span>`;
  } else {
    badge.innerHTML='';
  }

  renderTab(_curTab, inc, exp);
}

function resetFilter(){
  document.getElementById('fFrom').value='';
  document.getElementById('fTo').value='';
  document.getElementById('periodBadge').innerHTML='';
  renderTab(_curTab, _allInc, _allExp);
}

async function load(){
  const params=new URLSearchParams(location.search);
  const pid=params.get('pid');
  if(!pid){
    document.getElementById('content').innerHTML='<div class="error">❌ لينك غير صحيح — مفيش كود مشروع</div>';
    return;
  }
  try{
    const [projects, allEntries]=await Promise.all([
      sbGet('projects?id=eq.'+pid+'&select=id,name,start_date,close_date'),
      sbGet('entries?project_id=eq.'+pid+'&select=id,seq,amount,description,entry_date,category,type&order=entry_date.asc&limit=2000')
    ]);

    if(!projects||!projects.length){
      document.getElementById('content').innerHTML='<div class="error">❌ المشروع غير موجود</div>';
      return;
    }

    _proj=projects[0];
    _allInc=allEntries.filter(e=>e.type==='i');
    _allExp=allEntries.filter(e=>e.type==='e');

    document.getElementById('projName').textContent='📋 '+_proj.name;
    document.getElementById('reportDate').textContent='تقرير بتاريخ: '+new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'});

    const defaultFrom=_proj.start_date?toInputDate(_proj.start_date):'';

    document.getElementById('content').innerHTML=`
      <div class="action-row">
        <button class="pdf-btn" onclick="window.print()">📕 طباعة / PDF</button>
        <a class="wa-btn" href="https://wa.me/?text=${encodeURIComponent('تقرير مشروع '+_proj.name+'\n'+location.href)}" target="_blank">📤 واتساب</a>
      </div>

      <div class="filter-card">
        <div class="filter-title">📅 فلتر الفترة</div>
        <div class="filter-row">
          <div class="filter-group">
            <span class="filter-label">من تاريخ</span>
            <input class="filter-input" type="date" id="fFrom" value="${defaultFrom}">
          </div>
          <div class="filter-group">
            <span class="filter-label">إلى تاريخ</span>
            <input class="filter-input" type="date" id="fTo">
          </div>
          <button class="filter-btn" onclick="applyFilter()">عرض</button>
          <button class="filter-reset" onclick="resetFilter()">كل الفترات</button>
        </div>
      </div>

      <div class="card">
        <div class="tabs">
          <button class="tab on" data-tab="summary" onclick="renderTab('summary',_allInc,_allExp)">📊 الملخص</button>
          <button class="tab" data-tab="inc" onclick="renderTab('inc',_allInc,_allExp)">📈 الوارد</button>
          <button class="tab" data-tab="exp" onclick="renderTab('exp',_allInc,_allExp)">📉 المصاريف</button>
        </div>
        <div id="tabBody"></div>
      </div>
    `;

    renderTab('summary', _allInc, _allExp);

  }catch(e){
    document.getElementById('content').innerHTML='<div class="error">❌ خطأ في تحميل البيانات: '+e.message+'</div>';
  }
}

load();
</script>
</body>
</html>
